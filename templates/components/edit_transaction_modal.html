<div class="modal fade"
     id="editTransactionModal"
     tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content border-0 rounded-4">

            <form
                id="editTransactionForm"
                method="POST"
                data-url-template="{{ url_for('cashbook.edit_transaction', entry_id=0) }}">

                <!-- Header -->
                <div class="modal-header">

                    <h4 class="fw-bold">
                        Edit Transaction
                    </h4>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <!-- Body -->
                <div class="modal-body">

                    <div class="row g-4">

                        <!-- Category -->
                        <div class="col-md-6">

                            <label class="form-label">
                                Category
                            </label>

                            <input
                                type="text"
                                id="editCategory"
                                name="category"
                                class="form-control"
                                required>

                        </div>

                        <!-- Amount -->
                        <div class="col-md-6">

                            <label class="form-label">
                                Amount
                            </label>

                            <input
                                type="number"
                                id="editAmount"
                                name="amount"
                                class="form-control"
                                min="0"
                                step="0.01"
                                required>

                        </div>

                        <!-- Payment Method -->
                        <div class="col-md-6">

                            <label class="form-label">
                                Payment Method
                            </label>

                            <select
                                id="editPaymentMethod"
                                name="payment_method"
                                class="form-select"
                                required>

                                <option value="Cash">Cash</option>
                                <option value="UPI">UPI</option>
                                <option value="Bank Transfer">Bank Transfer</option>

                            </select>

                        </div>

                        <!-- Date -->
                        <div class="col-md-6">

                            <label class="form-label">
                                Date
                            </label>

                            <input
                                type="date"
                                id="editDate"
                                name="transaction_date"
                                class="form-control"
                                required>

                        </div>

                        <!-- Person -->
                        <div class="col-md-6">

                            <label class="form-label">
                                Student / Vendor
                            </label>

                            <input
                                type="text"
                                id="editPerson"
                                name="person"
                                class="form-control">

                        </div>

                        <!-- Description -->
                        <div class="col-12">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                id="editDescription"
                                name="description"
                                class="form-control"
                                rows="3"></textarea>

                        </div>

                    </div>

                </div>

                <!-- Footer -->
                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-light"
                        data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="bi bi-check-circle me-2"></i>

                        Save Changes

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
