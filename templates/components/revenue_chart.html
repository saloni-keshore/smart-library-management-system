<div class="col-lg-8 mb-4 fade-up">

    <div class="card dashboard-card border-0 shadow-sm rounded-4">

        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">

            <h5 class="fw-bold mb-0">
                Revenue Overview
            </h5>

            <select class="form-select form-select-sm w-auto">

                <option>This Month</option>

                <option>This Year</option>

                <option>Last Year</option>

            </select>

        </div>

        <div class="card-body">

            <div class="chart-stage" data-chart-stage data-reveal-delay="900">

                <div class="chart-skeleton chart-skeleton-line" aria-hidden="true">

                    <div class="skeleton-line-box">

                        <svg class="skeleton-line-svg" viewBox="0 0 300 100" preserveAspectRatio="none">

                            <polygon class="skeleton-line-fill"
                                points="0,100 0,70 27,40 55,65 82,25 109,55 136,15 164,60 191,30 218,50 245,20 273,58 300,32 300,100">
                            </polygon>

                            <polyline class="skeleton-line-stroke"
                                points="0,70 27,40 55,65 82,25 109,55 136,15 164,60 191,30 218,50 245,20 273,58 300,32">
                            </polyline>

                        </svg>

                        <div class="skeleton-shimmer"></div>

                    </div>

                    <p class="chart-loader-text">
                        Loading revenue data...
                    </p>

                </div>

                <div class="chart-content" data-chart-content>

                    <div class="chart-placeholder">

                        <i class="bi bi-graph-up-arrow display-1 text-primary opacity-25"></i>

                        <h5 class="mt-3">

                            Revenue Chart

                        </h5>

                        <p class="text-muted">

                            Monthly revenue analytics will appear here.

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
