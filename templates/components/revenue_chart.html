<div class="col-lg-8 fade-up">

    <div class="card dashboard-card chart-card-revenue border-0 shadow-sm rounded-4 h-100">

        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">

            <h5 class="fw-bold mb-0">
                Revenue Overview
            </h5>

            <select class="form-select form-select-sm w-auto">

                <option>This Month</option>

                <option>This Year</option>

                <option>Last Year</option>

            </select>

        </div>

        <div class="card-body">

            <div class="chart-stage chart-stage-revenue" data-chart-stage data-reveal-delay="900">

                <!-- Loading Animation -->
                <div class="chart-skeleton chart-skeleton-line" aria-hidden="true">

                    <div class="skeleton-line-box">

                        <svg
                            class="skeleton-line-svg"
                            viewBox="0 0 300 100"
                            preserveAspectRatio="none">

                            <polygon
                                class="skeleton-line-fill"
                                points="0,100 0,70 27,40 55,65 82,25 109,55 136,15 164,60 191,30 218,50 245,20 273,58 300,32 300,100">
                            </polygon>

                            <polyline
                                class="skeleton-line-stroke"
                                points="0,70 27,40 55,65 82,25 109,55 136,15 164,60 191,30 218,50 245,20 273,58 300,32">
                            </polyline>

                        </svg>

                        <div class="skeleton-shimmer"></div>

                    </div>

                    <p class="chart-loader-text">
                        Loading revenue analytics...
                    </p>

                </div>

                <!-- Real Revenue Chart -->
                <div class="chart-content d-none" data-chart-content>

                    <div class="chart-frame" data-chart-frame>

                        <img
                            src="{{ url_for('static', filename='charts/revenue.png') }}"
                            class="chart-image"
                            alt="Revenue Chart">

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
