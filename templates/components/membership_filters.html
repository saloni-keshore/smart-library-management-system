<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 filters-bar">

    <div class="d-flex flex-wrap gap-2" id="membershipFilterChips">

        <button type="button" class="filter-chip active" data-filter="all">All</button>
        <button type="button" class="filter-chip" data-filter="active">Active</button>
        <button type="button" class="filter-chip" data-filter="expired">Expired</button>
        <button type="button" class="filter-chip" data-filter="monthly">Monthly</button>
        <button type="button" class="filter-chip" data-filter="quarterly">Quarterly</button>
        <button type="button" class="filter-chip" data-filter="half-yearly">Half-Yearly</button>
        <button type="button" class="filter-chip" data-filter="yearly">Yearly</button>

    </div>

    <div class="search-field-compact">

        <i class="bi bi-search"></i>

        <input
            type="text"
            id="membershipSearchInput"
            class="form-control form-control-sm"
            placeholder="Search by Library ID, Student or Mobile...">

    </div>

</div>
