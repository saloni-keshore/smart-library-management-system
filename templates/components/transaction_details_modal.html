<div class="modal fade"
     id="transactionDetailsModal"
     tabindex="-1">

    <div class="modal-dialog modal-md">

        <div class="modal-content border-0 rounded-4">

            <div class="modal-header">

                <h4 class="fw-bold">
                    Transaction Details
                </h4>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="row g-3 transaction-details-body">

                    <div class="col-6">
                        <small class="text-muted d-block">Transaction Type</small>
                        <span class="fw-semibold" id="detailType">—</span>
                    </div>

                    <div class="col-6">
                        <small class="text-muted d-block">Category</small>
                        <span class="fw-semibold" id="detailCategory">—</span>
                    </div>

                    <div class="col-6">
                        <small class="text-muted d-block">Student / Vendor</small>
                        <span class="fw-semibold" id="detailPerson">—</span>
                    </div>

                    <div class="col-6">
                        <small class="text-muted d-block">Payment Method</small>
                        <span class="fw-semibold" id="detailPaymentMethod">—</span>
                    </div>

                    <div class="col-6">
                        <small class="text-muted d-block">Amount</small>
                        <span class="fw-bold fs-5" id="detailAmount">—</span>
                    </div>

                    <div class="col-6">
                        <small class="text-muted d-block">Transaction Date</small>
                        <span class="fw-semibold" id="detailDate">—</span>
                    </div>

                    <div class="col-6">
                        <small class="text-muted d-block">Reference ID</small>
                        <code id="detailReferenceId">—</code>
                    </div>

                    <div class="col-6">
                        <small class="text-muted d-block">Source</small>
                        <span class="badge bg-light text-dark border" id="detailSource">—</span>
                    </div>

                    <div class="col-6">
                        <small class="text-muted d-block">Created By</small>
                        <span class="fw-semibold" id="detailCreatedBy">—</span>
                    </div>

                    <div class="col-12">
                        <small class="text-muted d-block">Description</small>
                        <p class="mb-0" id="detailDescription">—</p>
                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-light"
                    data-bs-dismiss="modal">

                    Close

                </button>

            </div>

        </div>

    </div>

</div>
