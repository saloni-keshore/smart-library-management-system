<div class="col-lg-4 mb-4 fade-up">

    <div class="card dashboard-card border-0 shadow-sm rounded-4">

        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">

            <h5 class="fw-bold mb-0">
                Membership Distribution
            </h5>

            <button class="btn btn-sm btn-outline-secondary">
                View
            </button>

        </div>

        <div class="card-body">

            <div class="chart-stage" data-chart-stage data-reveal-delay="1200">

                <div class="chart-skeleton chart-skeleton-pie" aria-hidden="true">

                    <div class="skeleton-pie-ring">

                        <div class="skeleton-pie-hole"></div>

                        <div class="skeleton-shimmer"></div>

                    </div>

                    <p class="chart-loader-text">
                        Loading membership data...
                    </p>

                </div>

                <div class="chart-content" data-chart-content>

                    <div class="chart-placeholder">

                        <i class="bi bi-pie-chart display-1 text-info opacity-25"></i>

                        <h5 class="mt-3">

                            Membership Chart

                        </h5>

                        <p class="text-muted text-center">

                            Monthly, Quarterly, Half-Yearly and Yearly memberships will appear here.

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
