{% extends "layouts/base.html" %}

{% block title %}
Edit Enquiry
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h3>

                <i class="bi bi-pencil-square"></i>

                Edit Enquiry

            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">

                        Full Name

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="full_name"
                        value="{{ enquiry.full_name }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Mobile Number

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="mobile"
                        value="{{ enquiry.mobile }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Purpose

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="purpose"
                        value="{{ enquiry.purpose }}">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Preferred Shift

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="preferred_shift"
                        value="{{ enquiry.preferred_shift }}">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Follow-up Date

                    </label>

                    <input
                        type="date"
                        class="form-control"
                        name="followup_date"
                        value="{{ enquiry.followup_date }}">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Remarks

                    </label>

                    <textarea
                        class="form-control"
                        name="remarks"
                        rows="4">{{ enquiry.remarks }}</textarea>

                </div>

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-warning">

                        <i class="bi bi-check-circle"></i>

                        Update Enquiry

                    </button>

                    <a
                        href="{{ url_for('enquiry.index') }}"
                        class="btn btn-secondary">

                        <i class="bi bi-arrow-left"></i>

                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
